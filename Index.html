<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bitácora Sur Radio</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial,Helvetica,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:340px;
text-align:center;
}

.cover{
width:100%;
aspect-ratio:1;
background:#222;
border-radius:18px;
overflow:hidden;
}

.cover img{
width:100%;
height:100%;
object-fit:cover;
}

.artist{
margin-top:18px;
font-size:18px;
font-weight:bold;
}

.song{
font-size:15px;
opacity:.8;
margin-top:5px;
}

.live{
margin-top:20px;
color:#4cff6b;
font-size:14px;
letter-spacing:2px;
}

button{
margin-top:25px;
width:100%;
padding:16px;
background:white;
color:black;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

.footer{
margin-top:30px;
font-size:12px;
opacity:.6;
line-height:1.5;
}

</style>

</head>

<body>

<div class="card">

<div class="cover">
<img src="https://picsum.photos/600" id="cover">
</div>

<div class="artist">
Bitácora Sur
</div>

<div class="song">
Radio Online
</div>

<div class="live">
● EN VIVO
</div>

<audio id="radio" controls style="display:none;">
<source src="AQUI_VA_TU_STREAM" type="audio/mpeg">
</audio>

<button onclick="playRadio()">
▶ Escuchar
</button>

<div class="footer">
Transmitiendo desde<br>
Licanray · Chile
</div>

</div>

<script>

let radio=document.getElementById("radio");

function playRadio(){

if(radio.paused){
radio.play();
}else{
radio.pause();
}

}

</script>

</body>

</html>
